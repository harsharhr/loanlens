<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Usemecalculator">
  <rect width="64" height="64" rx="15" fill="#0f766e"/>
  <rect width="64" height="64" rx="15" fill="url(#g)" fill-opacity="0.18"/>
  <!-- rising trend line (growth) -->
  <path d="M15 39 L27 30 L36 35 L49 21" stroke="#f4d9a6" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="49" cy="21" r="3.4" fill="#f4d9a6"/>
  <!-- equals bars (calculation) -->
  <rect x="15" y="46" width="34" height="3.4" rx="1.7" fill="#ffffff" fill-opacity="0.92"/>
  <rect x="15" y="53" width="22" height="3.4" rx="1.7" fill="#ffffff" fill-opacity="0.55"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
